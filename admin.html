<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JoyTech | Professional Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-8 min-h-screen">

    <div id="authGate" class="max-w-md mx-auto bg-slate-900 p-8 rounded-2xl border border-slate-800">
        <h2 class="text-xl font-bold mb-4 text-white">Administrator Login</h2>
        <input type="password" id="pass" class="w-full bg-slate-950 p-3 rounded-xl border border-slate-700 mb-4" placeholder="Enter Admin Password">
        <button onclick="login()" class="w-full bg-blue-600 p-3 rounded-xl font-bold hover:bg-blue-700 transition">Enter Dashboard</button>
    </div>

    <div id="dashboard" class="hidden max-w-5xl mx-auto space-y-8">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold text-white">Business Control Center</h1>
            <button onclick="location.reload()" class="bg-slate-800 px-4 py-2 rounded-lg text-sm hover:bg-slate-700">Refresh Data</button>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="font-bold mb-4 text-white">Manual Record Entry</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="inName" placeholder="Customer Name" class="bg-slate-950 p-3 rounded-lg border border-slate-700">
                <input id="inService" placeholder="Service Name" class="bg-slate-950 p-3 rounded-lg border border-slate-700">
                <input id="inEmail" placeholder="Email" class="bg-slate-950 p-3 rounded-lg border border-slate-700 col-span-2">
                <textarea id="inMsg" placeholder="Details/Message" class="col-span-2 bg-slate-950 p-3 rounded-lg border border-slate-700"></textarea>
                <button onclick="addEntry()" class="col-span-2 bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700">Add Entry to System</button>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <table class="w-full text-left">
                <thead><tr class="text-slate-500 text-xs uppercase border-b border-slate-800">
                    <th class="pb-3">Name</th><th class="pb-3">Service</th><th class="pb-3">Action</th>
                </tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let savedPass = "";

        async function login() {
            savedPass = document.getElementById('pass').value;
            const res = await fetch('/api/admin/stats', { headers: {'x-admin-password': savedPass}});
            if (res.ok) {
                document.getElementById('authGate').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else { alert("Authentication Failed."); }
        }

        async function loadData() {
            const res = await fetch('/api/messages', { headers: {'x-admin-password': savedPass}});
            const data = await res.json();
            document.getElementById('tableBody').innerHTML = data.map(i => `
                <tr class="border-b border-slate-800">
                    <td class="py-4 text-white">${i.name}</td>
                    <td class="py-4 text-blue-400">${i.service}</td>
                    <td class="py-4"><button onclick="del(${i.id})" class="text-red-400 hover:text-red-300">Delete</button></td>
                </tr>
            `).join('');
        }

        async function addEntry() {
            await fetch('/api/requests', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'x-admin-password': savedPass},
                body: JSON.stringify({
                    name: document.getElementById('inName').value,
                    email: document.getElementById('inEmail').value,
                    service: document.getElementById('inService').value,
                    message: document.getElementById('inMsg').value
                })
            });
            loadData();
        }

        async function del(id) {
            await fetch(`/api/requests/${id}`, {
                method: 'DELETE',
                headers: {'x-admin-password': savedPass}
            });
            loadData();
        }
    </script>
</body>
</html>
