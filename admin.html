<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Control Center | JoyTech Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-6">

    <div id="authGate" class="max-w-md mx-auto mt-20 bg-slate-900 p-8 rounded-xl border border-slate-800">
        <h2 class="text-xl font-bold mb-4 text-white">Admin Access</h2>
        <input type="password" id="pass" class="w-full bg-slate-950 p-3 rounded-lg border border-slate-700 mb-4 text-white outline-none" placeholder="Enter Password">
        <button onclick="login()" class="w-full bg-blue-600 p-3 rounded-lg font-bold text-white hover:bg-blue-700">Open Dashboard</button>
    </div>

    <div id="dashboard" class="hidden max-w-5xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center bg-slate-900 p-6 rounded-xl border border-slate-800">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Business Control Center</h1>
                <p class="text-xs text-slate-400 mt-1">Total System Requests: <span id="statsCount" class="text-blue-400 font-bold">0</span></p>
            </div>
            <div class="flex space-x-2">
                <button onclick="loadData()" class="bg-slate-800 text-xs px-4 py-2 rounded hover:bg-slate-700 transition">Refresh Data</button>
                <button onclick="location.reload()" class="bg-red-950 text-red-400 text-xs px-4 py-2 rounded hover:bg-red-900 transition">Logout</button>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 space-y-4">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider">New Record Entry</h2>
            <form id="adminInsertForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="adminName" placeholder="Customer Name" required class="w-full bg-slate-950 p-3 rounded border border-slate-800 text-sm outline-none focus:border-blue-500">
                    <select id="adminService" required class="w-full bg-slate-950 p-3 rounded border border-slate-800 text-sm text-slate-400 outline-none focus:border-blue-500">
                        <option value="" disabled selected>Select Service...</option>
                        <option value="KRA Tax Returns">KRA Tax Returns</option>
                        <option value="eCitizen Applications">eCitizen Applications</option>
                        <option value="ICT Support">ICT Support</option>
                        <option value="Document Processing">Document Processing</option>
                    </select>
                </div>
                <input type="email" id="adminEmail" placeholder="joy@gmail.com" required class="w-full bg-slate-950 p-3 rounded border border-slate-800 text-sm outline-none focus:border-blue-500">
                <textarea id="adminMessage" rows="3" placeholder="Responsive note or details..." required class="w-full bg-slate-950 p-3 rounded border border-slate-800 text-sm outline-none focus:border-blue-500"></textarea>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition text-sm">Add Entry to System</button>
            </form>
        </div>

        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-500 text-xs uppercase border-b border-slate-800">
                        <th class="pb-3 px-2 w-1/4">Customer</th>
                        <th class="pb-3 px-2 w-1/4">Service</th>
                        <th class="pb-3 px-2 w-2/5">Message Details</th>
                        <th class="pb-3 px-2 text-right w-1/12">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let savedPass = "";

        async function login() {
            savedPass = document.getElementById('pass').value;
            const res = await fetch('/api/admin/stats', { headers: {'x-admin-password': savedPass}});
            if (res.ok) {
                const stats = await res.json();
                document.getElementById('statsCount').textContent = stats.totalRequests;
                document.getElementById('authGate').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else { 
                alert("Wrong password."); 
            }
        }

        async function loadData() {
            const res = await fetch('/api/messages', { headers: {'x-admin-password': savedPass}});
            const data = await res.json();

            const statsRes = await fetch('/api/admin/stats', { headers: {'x-admin-password': savedPass}});
            if (statsRes.ok) {
                const stats = await statsRes.json();
                document.getElementById('statsCount').textContent = stats.totalRequests;
            }
            
            document.getElementById('tableBody').innerHTML = data.map(i => `
                <tr class="border-b border-slate-800/50 text-sm hover:bg-slate-900/50 transition">
                    <td class="py-4 px-2 text-white font-medium">${i.name}<br><span class="text-xs text-slate-500 select-all">${i.email}</span></td>
                    <td class="py-4 px-2 text-blue-400 font-medium">${i.service || 'General Inquire'}</td>
                    <td class="py-4 px-2 text-slate-300 whitespace-pre-wrap">${i.message}</td>
                    <td class="py-4 px-2 text-right"><button onclick="del(${i.id})" class="text-xs bg-red-950/50 text-red-400 px-3 py-1 rounded border border-red-900/40 hover:bg-red-900 transition">Delete</button></td>
                </tr>
            `).join('');
        }

        // Handle Admin Side Manual Insert Submissions
        document.getElementById('adminInsertForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('adminName').value,
                email: document.getElementById('adminEmail').value,
                service: document.getElementById('adminService').value,
                message: document.getElementById('adminMessage').value
            };

            const response = await fetch('/api/quote', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                document.getElementById('adminInsertForm').reset();
                loadData();
            } else {
                alert("Could not insert data row.");
            }
        });

        async function del(id) {
            if (confirm('Delete this user request?')) {
                await fetch(`/api/requests/${id}`, { method: 'DELETE', headers: {'x-admin-password': savedPass} });
                loadData();
            }
        }
    </script>
</body>
</html>
