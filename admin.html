<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech Solutions | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <!-- Open Dashboard View -->
    <div id="dashboardContent">
        <!-- Top Navigation Status Bar -->
        <header class="bg-slate-900/80 border-b border-slate-800 sticky top-0 z-40 backdrop-blur-sm">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-base shadow-md shadow-blue-600/10">J</div>
                    <span class="text-xl font-bold text-white tracking-tight">JoyTech <span class="text-blue-500 font-medium">Console</span></span>
                </div>
                <div class="text-[10px] text-emerald-400 border border-emerald-900/30 px-3 py-1.5 rounded-lg font-bold bg-emerald-950/50 uppercase tracking-wider">
                    Direct Management Mode
                </div>
            </div>
        </header>

        <!-- Metrics & Content Workspace Area -->
        <main class="max-w-7xl mx-auto px-6 py-10 space-y-8">
            <!-- Telemetry Metrics Grid Row -->
            <div class="grid md:grid-cols-3 gap-6">
                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-sm flex items-center justify-between relative overflow-hidden">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Total Submissions</p>
                        <h3 id="statTotal" class="text-3xl font-extrabold text-white">0</h3>
                    </div>
                    <div class="text-2xl p-3 bg-blue-950/40 border border-blue-900/30 rounded-lg text-blue-400">📥</div>
                </div>
                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-sm flex items-center justify-between relative overflow-hidden">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">System Status</p>
                        <h3 class="text-xs font-bold text-emerald-400 flex items-center mt-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 inline-block mr-2 animate-pulse"></span> Active & Open
                        </h3>
                    </div>
                    <div class="text-2xl p-3 bg-emerald-950/40 border border-emerald-900/30 rounded-lg text-emerald-400">🔓</div>
                </div>
                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-sm flex items-center justify-between relative overflow-hidden">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Database Cluster</p>
                        <h3 class="text-xs font-bold text-slate-200 mt-2 tracking-wide uppercase text-blue-400">Neon PostgreSQL</h3>
                    </div>
                    <div class="text-2xl p-3 bg-purple-950/40 border border-purple-900/30 rounded-lg text-purple-400">⚡</div>
                </div>
            </div>

            <!-- Customer Incoming Requests Queue Container -->
            <div class="bg-slate-900 rounded-xl border border-slate-800 shadow-xl overflow-hidden">
                <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/40">
                    <div>
                        <h4 class="text-lg font-bold text-white tracking-tight">Customer Request Pipeline</h4>
                        <p class="text-slate-500 text-xs mt-0.5">Real-time incoming submissions transmitted from your primary public landing interface.</p>
                    </div>
                    <button onclick="loadDashboardData()" class="text-[11px] bg-slate-950 hover:bg-slate-800 border border-slate-800 text-slate-300 px-3 py-1.5 rounded-md font-bold transition uppercase tracking-wider">
                        Refresh Queue
                    </button>
                </div>

                <!-- Feed Output Core Interface List -->
                <div id="messagesList" class="divide-y divide-slate-800/60 p-4 space-y-3 max-h-[600px] overflow-y-auto">
                    <p class="text-slate-500 text-xs text-center py-12">Synchronizing with cloud cluster records...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Script Data Processor Engine -->
    <script>
        async function loadDashboardData() {
            try {
                // Grab stats
                const statsRes = await fetch('/api/admin/stats');
                const statsData = await statsRes.json();
                document.getElementById('statTotal').textContent = statsData.totalRequests || 0;

                // Grab records queue dataset
                const msgRes = await fetch('/api/messages');
                const messages = await msgRes.json();

                const container = document.getElementById('messagesList');
                container.innerHTML = '';

                if (messages.length === 0) {
                    container.innerHTML = `<div class="text-slate-500 text-xs text-center py-16">No customer data entries found inside the operational data tables.</div>`;
                    return;
                }

                messages.forEach(msg => {
                    const block = document.createElement('div');
                    block.className = "bg-slate-950/40 p-5 rounded-lg border border-slate-900/60 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition hover:border-slate-800";
                    block.innerHTML = `
                        <div class="space-y-2 max-w-3xl">
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="text-white font-bold text-sm tracking-tight">${escapeHtml(msg.name)}</span>
                                <span class="text-slate-500 text-xs">${escapeHtml(msg.email)}</span>
                                <span class="text-[9px] font-bold tracking-widest px-2 py-0.5 bg-blue-950/60 border border-blue-900/40 text-blue-400 rounded uppercase">${escapeHtml(msg.service || 'General Assistance')}</span>
                            </div>
                            <p class="text-slate-300 text-xs leading-relaxed whitespace-pre-wrap font-medium">${escapeHtml(msg.message)}</p>
                        </div>
                        <button onclick="deleteRequest(${msg.id})" class="bg-red-950/20 hover:bg-red-600 text-red-400 hover:text-white border border-red-900/30 hover:border-red-600 text-[10px] font-bold px-3 py-1.5 rounded-md transition uppercase tracking-wider ml-auto md:ml-0 whitespace-nowrap">
                            Delete Row
                        </button>
                    `;
                    container.appendChild(block);
                });

            } catch (err) {
                console.error("Transmission breakdown:", err);
            }
        }

        async function deleteRequest(id) {
            if (!confirm("Are you sure you want to permanently delete this operational record?")) return;

            try {
                const res = await fetch(`/api/requests/${id}`, {
                    method: 'DELETE'
                });
                
                if (res.ok) {
                    loadDashboardData();
                } else {
                    alert("Unable to delete data row.");
                }
            } catch (err) {
                console.error(err);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // Load instantly on page view
        loadDashboardData();
    </script>
</body>
</html>
