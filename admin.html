<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech | Professional Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <div id="authGate" class="flex items-center justify-center min-h-screen p-8">
        <div class="max-w-md w-full bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-white">Administrator Login</h2>
            <input type="password" id="pass" class="w-full bg-slate-950 p-3 rounded-xl border border-slate-700 mb-4 focus:border-blue-500 outline-none" placeholder="Enter Admin Password">
            <button onclick="login()" class="w-full bg-blue-600 p-3 rounded-xl font-bold hover:bg-blue-700 transition">Enter Dashboard</button>
        </div>
    </div>

    <div id="dashboard" class="hidden max-w-5xl mx-auto p-8 space-y-8">
        
        <div class="flex flex-wrap justify-between items-center bg-slate-900 p-6 rounded-2xl border border-slate-800 gap-4">
            <div class="flex items-center gap-6">
                <a href="/" class="text-sm text-slate-400 hover:text-blue-400 transition font-medium flex items-center">
                    <span class="mr-2">←</span> Home
                </a>
                <h1 class="text-xl font-bold text-white tracking-tight">Control Center</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="loadData()" class="text-xs bg-slate-800 px-4 py-2 rounded-lg hover:bg-slate-700 transition">Refresh</button>
                <button onclick="logout()" class="text-xs bg-red-950 text-red-400 px-4 py-2 rounded-lg hover:bg-red-900 transition">Logout</button>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="font-bold mb-4 text-white">New Record Entry</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="inName" placeholder="Customer Name" class="bg-slate-950 p-3 rounded-lg border border-slate-700 focus:border-blue-500 outline-none">
                <input id="inService" placeholder="Service Name" class="bg-slate-950 p-3 rounded-lg border border-slate-700 focus:border-blue-500 outline-none">
                <input id="inEmail" placeholder="Email" class="bg-slate-950 p-3 rounded-lg border border-slate-700 col-span-2 focus:border-blue-500 outline-none">
                <textarea id="inMsg" placeholder="Details/Message" class="col-span-2 bg-slate-950 p-3 rounded-lg border border-slate-700 focus:border-blue-500 outline-none"></textarea>
                <button onclick="addEntry()" class="col-span-2 bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700 transition">Add Entry to System</button>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <table class="w-full text-left">
                <thead><tr class="text-slate-500 text-xs uppercase border-b border-slate-800">
                    <th class="pb-3">Customer</th><th class="pb-3">Service</th><th class="pb-3 text-right">Action</th>
                </tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <a href="https://wa.me/254700000000" target="_blank" class="fixed bottom-8 right-8 bg-green-600 p-4 rounded-full shadow-lg hover:bg-green-500 transition-all z-50">
        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12.03 2c-5.52 0-10 4.48-10 10 0 1.76.46 3.49 1.33 5.01l-1.33 4.86 5.01-1.33c1.47.8 3.16 1.22 4.98 1.22 5.52 0 10-4.48 10-10s-4.48-10-10-10zm0 18.33c-1.57 0-3.11-.42-4.45-1.22l-.32-.19-3.32.88.88-3.32-.19-.32c-.8-1.34-1.22-2.88-1.22-4.45 0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/></svg>
    </a>

    <script>
        let savedPass = "";

        async function login() {
            savedPass = document.getElementById('pass').value;
            const res = await fetch('/api/admin/stats', { headers: {'x-admin-password': savedPass}});
            if (res.ok) {
                document.getElementById('authGate').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else { alert("Authentication Failed."); }
        }

        async function loadData() {
            const res = await fetch('/api/messages', { headers: {'x-admin-password': savedPass}});
            const data = await res.json();
            document.getElementById('tableBody').innerHTML = data.map(i => `
                <tr class="border-b border-slate-800">
                    <td class="py-4 text-white font-medium">${i.name} <br/><span class="text-xs text-slate-500">${i.email}</span></td>
                    <td class="py-4 text-blue-400 font-semibold">${i.service}</td>
                    <td class="py-4 text-right"><button onclick="del(${i.id})" class="text-xs bg-red-950 text-red-400 px-3 py-1 rounded-full hover:bg-red-900 transition">Delete</button></td>
                </tr>
            `).join('');
        }

        async function addEntry() {
            await fetch('/api/requests', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'x-admin-password': savedPass},
                body: JSON.stringify({
                    name: document.getElementById('inName').value,
                    email: document.getElementById('inEmail').value,
                    service: document.getElementById('inService').value,
                    message: document.getElementById('inMsg').value
                })
            });
            loadData();
        }

        async function del(id) {
            if(confirm('Are you sure?')) {
                await fetch(`/api/requests/${id}`, {
                    method: 'DELETE',
                    headers: {'x-admin-password': savedPass}
                });
                loadData();
            }
        }

        function logout() {
            savedPass = "";
            document.getElementById('pass').value = "";
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('authGate').classList.remove('hidden');
        }
    </script>
</body>
</html>
