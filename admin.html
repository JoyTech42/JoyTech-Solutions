<!DOCTYPE html>
<html>
<head>
    <title>JoyTech Solutions | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-8">
    <div id="authGate" class="max-w-md mx-auto">
        <input type="password" id="pass" class="w-full bg-slate-900 p-3 rounded mb-4" placeholder="Admin Password">
        <button onclick="login()" class="w-full bg-blue-600 p-3 rounded">Login</button>
    </div>

    <div id="dashboard" class="hidden max-w-4xl mx-auto">
        <div class="flex justify-between mb-8">
            <h1 class="text-xl font-bold">Admin Portal</h1>
            <button onclick="location.reload()" class="text-xs">Logout</button>
        </div>
        <table class="w-full text-left">
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let savedPass = "";
        async function login() {
            savedPass = document.getElementById('pass').value;
            const res = await fetch('/api/messages', { headers: {'x-admin-password': savedPass}});
            if (res.ok) {
                document.getElementById('authGate').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            }
        }
        async function loadData() {
            const res = await fetch('/api/messages', { headers: {'x-admin-password': savedPass}});
            const data = await res.json();
            document.getElementById('tableBody').innerHTML = data.map(i => `
                <tr class="border-b border-slate-800">
                    <td class="p-3">${i.name}</td>
                    <td class="p-3">${i.service}</td>
                    <td class="p-3"><button onclick="del(${i.id})" class="text-red-500">Delete</button></td>
                </tr>
            `).join('');
        }
        async function del(id) {
            await fetch(`/api/requests/${id}`, { method: 'DELETE', headers: {'x-admin-password': savedPass} });
            loadData();
        }
    </script>
</body>
</html>
