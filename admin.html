<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech Solutions | Admin Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <div id="authGate" class="flex items-center justify-center min-h-screen p-8">
        <div class="max-w-md w-full bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-white">Administrator Login</h2>
            <input type="password" id="pass" class="w-full bg-slate-950 p-3 rounded-xl border border-slate-700 mb-4 focus:border-blue-500 outline-none" placeholder="Enter Admin Password">
            <button onclick="login()" class="w-full bg-blue-600 p-3 rounded-xl font-bold hover:bg-blue-700 transition">Enter Dashboard</button>
        </div>
    </div>

    <div id="dashboard" class="hidden max-w-5xl mx-auto p-8 space-y-8">
        
        <div class="flex flex-wrap justify-between items-center bg-slate-900 p-6 rounded-2xl border border-slate-800 gap-4">
            <div class="flex items-center gap-6">
                <a href="/" class="text-sm text-slate-400 hover:text-blue-400 transition font-medium flex items-center">
                    <span class="mr-2">←</span> Home
                </a>
                <h1 class="text-xl font-bold text-white tracking-tight">Control Center</h1>
                <div class="text-xs bg-slate-950 border border-slate-800 px-3 py-1.5 rounded-full text-blue-400">
                    Total Inquiries: <span id="statsCount" class="font-bold">0</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="loadData()" class="text-xs bg-slate-800 px-4 py-2 rounded-lg hover:bg-slate-700 transition">Refresh</button>
                <button onclick="logout()" class="text-xs bg-red-950 text-red-400 px-4 py-2 rounded-lg hover:bg-red-900 transition">Logout</button>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                    <tr class="text-slate-500 text-xs uppercase border-b border-slate-800">
                        <th class="pb-3 w-1/4">Customer Info</th>
                        <th class="pb-3 w-1/2">Inquiry / Message</th>
                        <th class="pb-3 text-right w-1/4">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let savedPass = "";

        async function login() {
            savedPass = document.getElementById('pass').value;
            const res = await fetch('/api/admin/stats', { headers: {'x-admin-password': savedPass}});
            if (res.ok) {
                const stats = await res.json();
                document.getElementById('statsCount').textContent = stats.totalRequests;
                document.getElementById('authGate').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else { 
                alert("Authentication Failed."); 
            }
        }

        async function loadData() {
            const res = await fetch('/api/messages', { headers: {'x-admin-password': savedPass}});
            const data = await res.json();
            
            // Re-fetch stats count to keep banner current on click
            const statsRes = await fetch('/api/admin/stats', { headers: {'x-admin-password': savedPass}});
            if (statsRes.ok) {
                const stats = await statsRes.json();
                document.getElementById('statsCount').textContent = stats.totalRequests;
            }

            document.getElementById('tableBody').innerHTML = data.map(i => `
                <tr class="border-b border-slate-800/60 hover:bg-slate-900/40 transition">
                    <td class="py-4 pr-3 text-white font-medium vertical-align-top">
                        ${i.name} 
                        <br/><span class="text-xs text-slate-500 font-normal select-all">${i.email}</span>
                    </td>
                    <td class="py-4 pr-3 text-slate-300 text-sm whitespace-pre-wrap leading-relaxed">${i.message}</td>
                    <td class="py-4 text-right vertical-align-top">
                        <button onclick="del(${i.id})" class="text-xs bg-red-950/60 text-red-400 border border-red-900/40 px-3 py-1.5 rounded-lg hover:bg-red-900 transition">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function del(id) {
            if (confirm('Are you absolutely sure you want to delete this client request entry?')) {
                await fetch(`/api/requests/${id}`, {
                    method: 'DELETE',
                    headers: {'x-admin-password': savedPass}
                });
                loadData();
            }
        }

        function logout() {
            savedPass = "";
            document.getElementById('pass').value = "";
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('authGate').classList.remove('hidden');
        }
    </script>
</body>
</html>
