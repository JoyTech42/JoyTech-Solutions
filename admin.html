<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech Solutions | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Security Check: Kick out unauthenticated visitors before page renders
        if (!localStorage.getItem('joytech_admin_token')) {
            window.location.href = '/login.html';
        }
    </script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <header class="bg-slate-900/80 border-b border-slate-800 sticky top-0 z-40 backdrop-blur-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-base">J</div>
                <span class="text-xl font-bold text-white tracking-tight">JoyTech <span class="text-blue-500 font-medium">Console</span></span>
            </div>
            <button onclick="logoutAdmin()" class="text-[10px] bg-slate-950 hover:bg-red-950/40 border border-slate-800 hover:border-red-900/50 text-slate-400 hover:text-red-400 px-3 py-1.5 rounded-lg font-bold transition uppercase tracking-wider">
                Log Out
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10 space-y-8">
        <div class="grid md:grid-cols-3 gap-6">
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Total Submissions</p>
                    <h3 id="statTotal" class="text-3xl font-extrabold text-white">0</h3>
                </div>
                <div class="text-2xl p-3 bg-blue-950/40 border border-blue-900/30 rounded-lg text-blue-400">📥</div>
            </div>
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Security Status</p>
                    <h3 class="text-xs font-bold text-emerald-400 flex items-center mt-2">Protected</h3>
                </div>
                <div class="text-2xl p-3 bg-emerald-950/40 border border-emerald-900/30 rounded-lg text-emerald-400">🔒</div>
            </div>
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Database Cluster</p>
                    <h3 class="text-xs font-bold text-blue-400 mt-2 uppercase">Neon PostgreSQL</h3>
                </div>
                <div class="text-2xl p-3 bg-purple-950/40 border border-purple-900/30 rounded-lg text-purple-400">⚡</div>
            </div>
        </div>

        <div class="bg-slate-900 rounded-xl border border-slate-800 shadow-xl overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <h4 class="text-lg font-bold text-white tracking-tight">Customer Request Pipeline</h4>
                <button onclick="loadDashboardData()" class="text-[11px] bg-slate-950 hover:bg-slate-800 border border-slate-800 text-slate-300 px-3 py-1.5 rounded-md font-bold transition uppercase tracking-wider">
                    Refresh Queue
                </button>
            </div>
            <div id="messagesList" class="divide-y divide-slate-800/60 p-4 space-y-3">
                <p class="text-slate-500 text-xs text-center py-12">Synchronizing...</p>
            </div>
        </div>
    </main>

    <script>
        async function loadDashboardData() {
            const token = localStorage.getItem('joytech_admin_token');
            const headers = { 'Authorization': `Bearer ${token}` };

            try {
                const statsRes = await fetch('/api/admin/stats', { headers });
                if (statsRes.status === 401 || statsRes.status === 403) return logoutAdmin();
                const statsData = await statsRes.status === 200 ? await statsRes.json() : { totalRequests: 0 };
                document.getElementById('statTotal').textContent = statsData.totalRequests;

                const msgRes = await fetch('/api/messages', { headers });
                const messages = await msgRes.json();

                const container = document.getElementById('messagesList');
                container.innerHTML = '';

                if (!messages || messages.length === 0) {
                    container.innerHTML = `<div class="text-slate-500 text-xs text-center py-16">No customer entries found.</div>`;
                    return;
                }

                messages.forEach(msg => {
                    const block = document.createElement('div');
                    block.className = "bg-slate-950/40 p-5 rounded-lg border border-slate-900/60 flex flex-col md:flex-row justify-between items-start md:items-center gap-4";
                    block.innerHTML = `
                        <div class="space-y-2 max-w-3xl">
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="text-white font-bold text-sm">${escapeHtml(msg.name)}</span>
                                <span class="text-slate-500 text-xs">${escapeHtml(msg.email)}</span>
                                <span class="text-[9px] font-bold tracking-widest px-2 py-0.5 bg-blue-950/60 border border-blue-900/40 text-blue-400 rounded uppercase">${escapeHtml(msg.service)}</span>
                            </div>
                            <p class="text-slate-300 text-xs leading-relaxed whitespace-pre-wrap font-medium">${escapeHtml(msg.message)}</p>
                        </div>
                        <button onclick="deleteRequest(${msg.id})" class="bg-red-950/20 hover:bg-red-600 text-red-400 hover:text-white border border-red-900/30 text-[10px] font-bold px-3 py-1.5 rounded-md transition uppercase tracking-wider">
                            Delete
                        </button>
                    `;
                    container.appendChild(block);
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteRequest(id) {
            if (!confirm("Delete record permanently?")) return;
            try {
                await fetch(`/api/requests/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('joytech_admin_token')}` }
                });
                loadDashboardData();
            } catch (err) {
                console.error(err);
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('joytech_admin_token');
            window.location.href = '/login.html';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        loadDashboardData();
    </script>
</body>
</html>
