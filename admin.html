<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JoyTech | Professional Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-8 min-h-screen">

    <!-- Auth Gate remains the same... -->
    <div id="authGate" class="max-w-md mx-auto bg-slate-900 p-8 rounded-2xl border border-slate-800">
        <h2 class="text-xl font-bold mb-4 text-white">Administrator Login</h2>
        <input type="password" id="pass" class="w-full bg-slate-950 p-3 rounded-xl border border-slate-700 mb-4" placeholder="Enter Admin Password">
        <button onclick="login()" class="w-full bg-blue-600 p-3 rounded-xl font-bold hover:bg-blue-700 transition">Enter Dashboard</button>
    </div>

    <!-- Dashboard Interface -->
    <div id="dashboard" class="hidden max-w-5xl mx-auto space-y-8">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold text-white tracking-tight">Business Control Center</h1>
            <button onclick="loadData()" class="text-xs bg-slate-800 px-4 py-2 rounded-lg hover:bg-slate-700">Refresh Data</button>
        </div>

        <!-- Professional Management Form -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
            <h2 class="font-bold mb-4 text-white">New Record Entry</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="inName" placeholder="Customer Name" class="bg-slate-950 p-3 rounded-lg border border-slate-700 focus:border-blue-500 outline-none">
                <input id="inService" placeholder="Service Name" class="bg-slate-950 p-3 rounded-lg border border-slate-700 focus:border-blue-500 outline-none">
                <input id="inEmail" placeholder="Email" class="bg-slate-950 p-3 rounded-lg border border-slate-700 col-span-2 focus:border-blue-500 outline-none">
                <textarea id="inMsg" placeholder="Details/Message" class="col-span-2 bg-slate-950 p-3 rounded-lg border border-slate-700 focus:border-blue-500 outline-none"></textarea>
                <button id="addBtn" onclick="addEntry()" class="col-span-2 bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700 transition">Add Entry to System</button>
            </div>
        </div>

        <!-- Polished Data Table -->
        <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-950/50">
                    <tr class="text-slate-500 text-xs uppercase tracking-wider">
                        <th class="p-4">Customer</th>
                        <th class="p-4">Service</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </div>

    <script>
        let savedPass = "";

        async function login() {
            savedPass = document.getElementById('pass').value;
            const res = await fetch('/api/admin/stats', { headers: {'x-admin-password': savedPass}});
            if (res.ok) {
                document.getElementById('authGate').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else { alert("Authentication Failed."); }
        }

        async function loadData() {
            const tableBody = document.getElementById('tableBody');
            tableBody.classList.add('loading');
            
            const res = await fetch('/api/messages', { headers: {'x-admin-password': savedPass}});
            const data = await res.json();
            
            tableBody.innerHTML = data.map(i => `
                <tr>
                    <td class="p-4 font-medium text-white">${i.name} <br/><span class="text-xs text-slate-500">${i.email}</span></td>
                    <td class="p-4 text-blue-400 font-semibold">${i.service}</td>
                    <td class="p-4 text-right">
                        <button onclick="del(${i.id})" class="text-xs bg-red-950 text-red-400 px-3 py-1 rounded-full hover:bg-red-900 transition">Delete</button>
                    </td>
                </tr>
            `).join('');
            tableBody.classList.remove('loading');
        }

        async function addEntry() {
            document.getElementById('addBtn').classList.add('loading');
            await fetch('/api/requests', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'x-admin-password': savedPass},
                body: JSON.stringify({
                    name: document.getElementById('inName').value,
                    email: document.getElementById('inEmail').value,
                    service: document.getElementById('inService').value,
                    message: document.getElementById('inMsg').value
                })
            });
            document.getElementById('addBtn').classList.remove('loading');
            loadData();
        }

        async function del(id) {
            // PROFESSIONAL SAFETY: Confirmation dialog
            if(confirm('Are you sure you want to delete this record?')) {
                await fetch(`/api/requests/${id}`, {
                    method: 'DELETE',
                    headers: {'x-admin-password': savedPass}
                });
                loadData();
            }
        }
    </script>
</body>
</html>
