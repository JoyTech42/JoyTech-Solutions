<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JoyTech Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-8">
    <div id="authGate" class="max-w-md mx-auto bg-slate-900 p-6 rounded-xl border border-slate-800">
        <h2 class="text-xl font-bold mb-4">Dashboard Authorization</h2>
        <input type="password" id="adminPasswordInput" class="w-full bg-slate-950 p-2 mb-4 rounded border border-slate-800" placeholder="Password">
        <button onclick="loginToDashboard()" class="w-full bg-blue-600 p-2 rounded">Login Now</button>
    </div>

    <div id="dashboardWidgets" class="hidden">
        <h2 class="text-2xl font-bold mb-6">Customer Requests</h2>
        <div id="messagesTableBody" class="space-y-2"></div>
    </div>

    <script>
        async function loginToDashboard() {
            const password = document.getElementById('adminPasswordInput').value;
            const res = await fetch('/api/admin/stats', { headers: { 'x-admin-password': password }});
            
            if (res.ok) {
                document.getElementById('authGate').classList.add('hidden');
                document.getElementById('dashboardWidgets').classList.remove('hidden');
                
                const msgs = await fetch('/api/messages', { headers: { 'x-admin-password': password }}).then(r => r.json());
                document.getElementById('messagesTableBody').innerHTML = msgs.map(m => `
                    <div class="p-4 bg-slate-900 rounded border border-slate-800">
                        <p class="font-bold">${m.name} - <span class="text-blue-400">${m.service}</span></p>
                        <p class="text-sm text-slate-400">${m.message}</p>
                    </div>
                `).join('');
            } else {
                alert("Login Failed. Password is not correct.");
            }
        }
    </script>
</body>
</html>
