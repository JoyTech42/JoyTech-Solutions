<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | JoyTech Solutions</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">JoyTech Solutions</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/services">Services</a>
      <a href="/contact">Contact</a>
      <button class="theme-toggle-btn" onclick="toggleTheme()">🌓 Mode</button>
      <div id="auth-zone">
        <button class="btn" onclick="openModal('login-modal')">Sign In</button>
      </div>
    </div>
  </nav>

  <main class="container" style="max-w: 600px;">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
      <h2 class="mb-4">Get in Touch</h2>
      <form id="contact-form" onsubmit="alert('Message Sent! We will contact you via email.'); event.preventDefault();">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label>Message / Inquiry</label>
          <textarea required placeholder="How can we help you today?"></textarea>
        </div>
        <button type="submit" class="btn btn-accent w-100">Send Secure Message</button>
      </form>
    </div>
  </main>

  <script src="client.js"></script>
</body>
</html>
