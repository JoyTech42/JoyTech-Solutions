<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Support | JoyTech Solutions</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">JoyTech Solutions</a>
    <div class="nav-links">
      <a href="/">Home</a><a href="/services">Services</a><a href="/contact">Contact</a>
    </div>
  </nav>
  <main class="container">
    <div class="auth-wrapper" style="max-width: 600px; margin: 3rem auto;">
      <h2 class="mb-4" style="color: var(--text-heading)">Secure Communications Desk</h2>
      <form onsubmit="alert('Message submitted into support queue.'); window.location.href='/'; return false;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" required placeholder="john@domain.com">
        </div>
        <div class="form-group">
          <label>Inquiry Message</label>
          <textarea style="height: 120px; resize: none;" required placeholder="Describe system dependencies or request custom task tracking assistance..."></textarea>
        </div>
        <button type="submit" class="btn btn-accent w-100">Send Encrypted Message</button>
      </form>
    </div>
  </main>
</body>
</html>
