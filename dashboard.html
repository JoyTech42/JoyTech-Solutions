<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Management Center | JoyTech Cyber</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-alt">
  <nav class="navbar">
    <div class="logo" onclick="window.location.href='/'" style="cursor:pointer">JoyTech Cyber Control Center</div>
    <div class="nav-links">
      <span id="user-greeting" style="font-weight:600"></span>
      <button class="btn" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <main class="container py-4">
    <div class="dashboard-card">
      <h2 id="dashboard-view-title" class="mb-4">Loading Data Management Matrix...</h2>
      <div class="table-responsive">
        <table class="data-table">
          <thead>
            <tr id="table-headers"></tr>
          </thead>
          <tbody id="dashboard-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="client.js"></script>
</body>
</html>
