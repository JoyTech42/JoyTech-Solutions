<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Dashboard | JoyTech Solutions</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">JoyTech Solutions</a>
    <div class="nav-links">
      <a href="/services">Catalog</a>
      <button class="btn" onclick="logout()">Sign Out</button>
    </div>
  </nav>
  <main class="container">
    <h2 style="color: var(--text-heading)">Account Workspace</h2>
    <div class="dashboard-grid">
      <aside class="sidebar">
        <ul class="sidebar-menu">
          <li><a href="#" class="active">Active Orders</a></li>
          <li><a href="/services">New Request</a></li>
          <li><a href="/contact">Support</a></li>
        </ul>
      </aside>
      <section class="table-responsive">
        <table class="data-table">
          <thead>
            <tr><th>Order ID</th><th>Service Portal</th><th>Details</th><th>Status</th></tr>
          </thead>
          <tbody id="dashboard-rows">
            <tr><td colspan="4" class="text-center" style="padding: 2rem;">Querying active workspace data pipeline...</td></tr>
          </tbody>
        </table>
      </section>
    </div>
  </main>
  <script>
    if(!localStorage.getItem('token')) window.location.href = '/login';
    function logout() { localStorage.clear(); window.location.href = '/'; }
    
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const res = await fetch('/api/requests/dashboard', {
          headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
        });
        const data = await res.json();
        const tbody = document.getElementById('dashboard-rows');
        
        if(!data.requests || data.requests.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" class="text-center">No active service provisions found.</td></tr>`;
          return;
        }
        
        tbody.innerHTML = data.requests.map(r => `
          <tr>
            <td>#${r.id}</td>
            <td style="color: var(--text-heading); font-weight:600">${r.title}</td>
            <td><code style="background: rgba(255,255,255,0.05); padding: 0.2rem 0.5rem; border-radius:4px">${r.details}</code></td>
            <td><span style="color: var(--accent); font-weight:700">${r.status.toUpperCase()}</span></td>
          </tr>
        `).join('');
      } catch(e) {
        console.error("Dashboard link system error:", e);
      }
    });
  </script>
</body>
</html>
