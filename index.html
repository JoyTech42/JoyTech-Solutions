<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech Solutions | Cyber & IT Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen">

    <div id="mainContent" class="hidden">
        <header class="sticky top-0 z-50 border-b border-slate-900 bg-slate-950/80 backdrop-blur-md">
            <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                <span class="text-xl font-bold text-white">JoyTech <span class="text-blue-500">Solutions</span></span>
            </div>
        </header>
        <section class="max-w-4xl mx-auto px-6 pt-20 text-center">
            <h1 class="text-2xl font-bold text-white">Welcome to the Dashboard</h1>
        </section>
    </div>

    <div id="authModal" class="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-950/90 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 w-full max-w-sm shadow-2xl">
            <h3 id="authTitle" class="text-xl font-bold text-white mb-6">Sign Up</h3>
            <form id="authForm" class="space-y-4">
                <input type="text" id="name" placeholder="Full Name" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
                <input type="email" id="email" required placeholder="Email Address" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
                <input type="password" id="password" required placeholder="Password" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
                <button type="submit" id="authBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition text-xs uppercase tracking-wider">Create Account</button>
            </form>
            <div class="mt-4 text-center">
                <button onclick="toggleAuth()" id="toggleBtn" class="text-xs text-slate-500 hover:text-blue-500 transition">Already have an account? Sign In</button>
            </div>
        </div>
    </div>

    <script>
       function toggleAuth() {
    const title = document.getElementById('authTitle');
    const btn = document.getElementById('authBtn');
    const toggle = document.getElementById('toggleBtn');
    const nameField = document.getElementById('name');
    
    // Clear inputs when switching
    document.getElementById('authForm').reset();

    if (title.textContent === 'Sign Up') {
        title.textContent = 'Sign In'; 
        btn.textContent = 'Sign In';
        toggle.textContent = 'Don\'t have an account? Sign Up';
        nameField.classList.add('hidden'); // Hide name field for Sign In
        nameField.removeAttribute('required'); // Prevent validation error
    } else {
        title.textContent = 'Sign Up'; 
        btn.textContent = 'Create Account';
        toggle.textContent = 'Already have an account? Sign In';
        nameField.classList.remove('hidden'); // Show name field for Sign Up
        nameField.setAttribute('required', 'required');
    }
}

        document.getElementById('authForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Get values from your input fields
    // Note: Ensure your HTML inputs have IDs 'name', 'email', 'password'
    const name = document.getElementById('name')?.value || 'Guest';
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok) {
            alert("Account created successfully! Now click 'Sign In' to enter.");
            toggleAuth(); // Switches to Sign In mode
        } else {
            alert("Signup Failed: " + (data.error || "Unknown error"));
        }
    } catch (err) {
        console.error("Connection Error:", err);
        alert("Server is not responding. Please check your Render logs.");
    }
});

                        document.getElementById('authModal').classList.add('hidden');
                        document.getElementById('mainContent').classList.remove('hidden');
                    } else {
                        alert("Account created! Please Sign In.");
                        toggleAuth();
                    }
                } else {
                    alert(data.error || "Authentication failed");
                }
            } catch (err) {
                alert("Connection error. Ensure server is running.");
            }
        });
    </script>
</body>
</html>
