<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech Solutions | Cyber & IT Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen">

    <!-- Gatekeeper Section -->
    <div id="gate" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950 p-6">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-xl font-bold text-white mb-6">Welcome to JoyTech Solutions</h2>
            <button onclick="openAuth()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl uppercase text-xs transition">Get Started</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="hidden">
        <header class="sticky top-0 z-50 border-b border-slate-900 bg-slate-950/80 backdrop-blur-md">
            <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                <a href="#home" class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-lg shadow-lg shadow-blue-600/20">J</div>
                    <span class="text-xl font-bold text-white tracking-tight">JoyTech Solutions</span>
                </a>
                <nav class="hidden md:flex items-center space-x-8 text-xs font-semibold tracking-wider uppercase text-slate-400">
                    <a href="#home" class="hover:text-white transition">Home</a>
                    <a href="#services" class="hover:text-white transition">Our Services</a>
                    <a href="#projects" class="hover:text-white transition">Our Projects</a>
                    <a href="#request" class="hover:text-white transition">Send Request</a>
                </nav>
            </div>
        </header>

        <section id="home" class="max-w-4xl mx-auto px-6 pt-20 pb-16 text-center">
            <h1 class="text-xl md:text-2xl font-bold text-white uppercase">Web & Software Development, Networking, KRA, eCitizen, and Computer Solutions</h1>
        </section>

        <footer class="border-t border-slate-900 bg-slate-950 py-12 text-center text-slate-500 text-xs">
            <p>&copy; 2026 JoyTech Solutions. All rights reserved.</p>
        </footer>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-950/90 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 w-full max-w-sm shadow-2xl relative">
            <h3 id="authTitle" class="text-xl font-bold text-white mb-6">Sign Up</h3>
            <form id="authForm" class="space-y-4">
                <input type="email" required placeholder="Email Address" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
                <input type="password" required placeholder="Password" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
                <button type="submit" id="authBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition text-xs uppercase tracking-wider">Create Account</button>
            </form>
            <div class="mt-4 text-center">
                <button onclick="toggleAuth()" id="toggleBtn" class="text-xs text-slate-500 hover:text-blue-500 transition">Already have an account? Sign In</button>
            </div>
        </div>
    </div>

    <script>
        function toggleAuth() {
            const title = document.getElementById('authTitle');
            const btn = document.getElementById('authBtn');
            const toggle = document.getElementById('toggleBtn');
            if (title.textContent === 'Sign Up') {
                title.textContent = 'Sign In'; btn.textContent = 'Sign In';
                toggle.textContent = 'Don\'t have an account? Sign Up';
            } else {
                title.textContent = 'Sign Up'; btn.textContent = 'Create Account';
                toggle.textContent = 'Already have an account? Sign In';
            }
        }

        function openAuth() { document.getElementById('authModal').classList.remove('hidden'); }
        
        document.getElementById('authForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('authTitle').textContent;
            
            if (title === 'Sign Up') {
                alert('Account created! Please sign in now.');
                toggleAuth(); // Switches to Sign In mode automatically
            } else {
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('authModal').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
