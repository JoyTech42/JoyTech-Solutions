<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech Cyber | Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">JoyTech Cyber</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/services">Services</a>
      <a href="/contact">Contact</a>
      <button class="theme-toggle-btn" onclick="toggleTheme()">🌓 Mode</button>
      <div id="auth-zone">
        <button class="btn" onclick="openModal('login-modal')">Sign In</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <header class="hero">
      <h1>Your Remote Cyber Cafe & Tech Hub</h1>
      <p>Instant, secure handling of your KRA returns, eCitizen forms, professional printing, and technical support requests.</p>
      <a href="/services" class="btn btn-accent">View On-Demand Catalog</a>
    </header>
  </main>

  <div id="login-modal" class="modal">
    <div class="modal-content">
      <h2 class="mb-4">Secure Client Login</h2>
      <form id="login-form">
        <div class="form-group"><input type="email" id="login-email" placeholder="Email Address" required></div>
        <div class="form-group"><input type="password" id="login-password" placeholder="Password" required></div>
        <button type="submit" class="btn btn-accent w-100">Sign In</button>
      </form>
      <span class="close" onclick="closeModal('login-modal')">Close Window</span>
    </div>
  </div>

  <script src="client.js"></script>
</body>
</html>
