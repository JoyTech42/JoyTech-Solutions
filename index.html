<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech Solutions | Cyber & IT Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen selection:bg-blue-600/30 selection:text-blue-400">

    <header class="sticky top-0 z-50 border-b border-slate-900 bg-slate-950/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-lg shadow-lg shadow-blue-600/20">J</div>
                <span class="text-xl font-bold text-white tracking-tight">JoyTech <span class="text-blue-500 font-medium">Solutions</span></span>
            </div>
            <nav class="hidden md:flex items-center space-x-8 text-xs font-semibold tracking-wider uppercase text-slate-400">
                <a href="#home" class="hover:text-white transition">Home</a>
                <a href="#services" class="hover:text-white transition">Our Services</a>
                <a href="#" onclick="checkAccess(event)" class="hover:text-white transition">Our Projects</a>
                <a href="#request" class="hover:text-white transition">Send Request</a>
                <button onclick="logout()" class="text-red-500 hover:text-red-400 transition">Logout</button>
            </nav>
            <a href="#request" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-5 py-2.5 rounded-xl transition uppercase tracking-wider shadow-md">Get Help Now</a>
        </div>
    </header>

    <section id="projects" class="max-w-7xl mx-auto px-6 py-20 border-t border-slate-900">
        <div class="text-center mb-16"><h2 class="text-2xl md:text-3xl font-extrabold text-white mb-3">Projects Done</h2></div>
        <div class="text-center">
            <a href="#" onclick="checkAccess(event, 'https://portfolio-1-pzy8.onrender.com/')" class="inline-block bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-6 py-3.5 rounded-xl transition uppercase tracking-wider shadow-lg shadow-blue-600/10">View All My Past Work ➔</a>
        </div>
    </section>

    <section id="request" class="max-w-xl mx-auto px-6 py-20">
        <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-8 shadow-2xl space-y-6">
            <h2 class="text-2xl font-bold text-white text-center">Send Us a Message</h2>
            <form id="submissionForm" class="space-y-5">
                <input type="text" name="name" required placeholder="Your Name" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
                <input type="email" name="email" required placeholder="Your Email" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
                <select name="service" required class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none cursor-pointer">
                    <option value="" disabled selected>Select a Service</option>
                    <option value="KRA">KRA Tax Returns</option>
                    <option value="eCitizen">eCitizen Applications</option>
                    <option value="ICT">Computer & ICT Help</option>
                    <option value="Graphic Design">Graphic Design</option>
                    <option value="Web">Website Development</option>
                </select>
                <textarea name="message" rows="4" required placeholder="Requirements details..." class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none resize-none"></textarea>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition text-xs uppercase tracking-wider">Send Message</button>
            </form>
        </div>
    </section>

    <div id="authModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 w-full max-w-sm">
            <h3 id="authTitle" class="text-xl font-bold text-white mb-6">Sign Up</h3>
            <form id="authForm" class="space-y-4">
                <input type="email" id="authEmail" required placeholder="Email Address" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
                <input type="password" id="authPassword" required placeholder="Password" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
                <button type="submit" id="authBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition text-xs uppercase tracking-wider">Create Account</button>
            </form>
            <p class="mt-4 text-center"><button onclick="toggleAuth()" id="toggleBtn" class="text-xs text-slate-500 hover:text-blue-500 transition">Already have an account? Sign In</button></p>
        </div>
    </div>

    <script>
        // Gatekeeper Logic
        function checkAccess(event, url) {
            if (!localStorage.getItem('token')) { event.preventDefault(); document.getElementById('authModal').classList.remove('hidden'); return false; }
            if (url) window.open(url, '_blank');
        }

        function logout() { localStorage.removeItem('token'); location.reload(); }

        // Form Submissions
        document.getElementById('submissionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/quote', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(Object.fromEntries(new FormData(e.target))) });
            if (res.ok) { alert('Message sent!'); e.target.reset(); }
        });

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const isSignUp = document.getElementById('authTitle').textContent === 'Sign Up';
            const res = await fetch(isSignUp ? '/api/auth/signup' : '/api/auth/signin', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: document.getElementById('authEmail').value, password: document.getElementById('authPassword').value })
            });
            const data = await res.json();
            if (res.ok) { 
                if (!isSignUp) { localStorage.setItem('token', data.token); location.reload(); } 
                else { alert('Created!'); toggleAuth(); } 
            } else { alert(data.error); }
        });

        function toggleAuth() { /* (Same toggle logic as your code) */ }
        window.addEventListener('load', () => { if (!localStorage.getItem('token')) document.getElementById('authModal').classList.remove('hidden'); });
    </script>
</body>
</html>
