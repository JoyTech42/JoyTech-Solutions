<!DOCTYPE html>
<html>
<head>
    <title>JoyTech Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-10">
    <h1 class="text-4xl font-bold mb-4">JoyTech Solutions</h1>
    <p>Professional digital and cyber services.</p>
    
    <div class="mt-10">
        <input id="name" placeholder="Name" class="block w-full bg-slate-900 p-2 mb-2">
        <input id="service" placeholder="Service" class="block w-full bg-slate-900 p-2 mb-2">
        <textarea id="msg" placeholder="Message" class="block w-full bg-slate-900 p-2 mb-2"></textarea>
        <button onclick="submitReq()" class="bg-blue-600 px-4 py-2 rounded">Submit Request</button>
    </div>

    <script>
        async function submitReq() {
            await fetch('/api/requests', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    service: document.getElementById('service').value,
                    message: document.getElementById('msg').value
                })
            });
            alert("Request Sent!");
        }
    </script>
</body>
</html>
