<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech Solutions | Professional IT Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen">

    <header class="sticky top-0 z-50 border-b border-slate-900 bg-slate-950/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-lg shadow-lg shadow-blue-600/20">J</div>
                <span class="text-xl font-bold text-white tracking-tight">JoyTech <span class="text-blue-500 font-medium">Solutions</span></span>
            </div>
            <nav class="hidden md:flex items-center space-x-6 text-sm font-medium text-slate-400">
                <a href="#home" class="hover:text-white transition">Home</a>
                <a href="#services" class="hover:text-white transition">Services</a>
                <a href="#" onclick="checkAccess(event)" class="hover:text-white transition">Past Work</a>
                <a href="#request" class="hover:text-white transition">Contact</a>
            </nav>
            <div id="userDisplay" class="hidden flex items-center space-x-4">
                <button onclick="logout()" class="bg-red-500/10 hover:bg-red-500/20 text-red-500 px-4 py-2 rounded-lg text-xs font-semibold uppercase tracking-wider transition">Logout</button>
            </div>
        </div>
    </header>

    <section id="portfolio" class="max-w-7xl mx-auto px-6 py-20">
        <h2 class="text-2xl font-extrabold text-white mb-10 text-center">Our Past Work</h2>
        <div class="grid md:grid-cols-3 gap-8">
            <a href="#" onclick="checkAccess(event, 'https://portfolio-1-pzy8.onrender.com')" class="group bg-slate-900/30 border border-slate-800 hover:border-blue-500/50 rounded-2xl p-6 flex flex-col transition">
                <div class="h-48 bg-slate-950 flex items-center justify-center text-4xl mb-4">🌐</div>
                <h3 class="font-bold text-white">Responsive Portfolio</h3>
                <p class="text-slate-400 text-xs mt-2">Sign in to view our live platform.</p>
            </a>
        </div>
    </section>

    <section id="request" class="max-w-xl mx-auto px-6 py-20 border-t border-slate-900">
        <h2 class="text-2xl font-extrabold text-white mb-8 text-center">Get In Touch</h2>
        <form id="contactForm" class="space-y-4">
            <input type="text" name="name" required placeholder="Name" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-lg text-sm text-white">
            <input type="email" name="email" required placeholder="Email" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-lg text-sm text-white">
            <textarea name="message" required placeholder="Message" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-lg text-sm text-white h-32"></textarea>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg uppercase tracking-wider text-sm transition">Send Message</button>
        </form>
    </section>

    <div id="authModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/90 backdrop-blur-sm hidden">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 w-full max-w-sm">
            <h2 id="authTitle" class="text-2xl font-bold text-blue-500 mb-2">Welcome Back</h2>
            <form id="authForm" class="space-y-4">
                <input type="email" id="authEmail" required placeholder="Email" class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-lg text-sm text-white">
                <input type="password" id="authPassword" required placeholder="Password" class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-lg text-sm text-white">
                <button type="submit" id="authBtn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg uppercase tracking-wider text-sm">Sign In</button>
            </form>
            <p class="mt-6 text-center text-xs text-slate-500">Don't have an account? <button onclick="toggleAuth()" id="toggleBtn" class="text-blue-500 font-bold ml-1">Sign Up</button></p>
        </div>
    </div>

    <script>
        function checkAccess(event, url) {
            if (!localStorage.getItem('token')) { event.preventDefault(); document.getElementById('authModal').classList.remove('hidden'); return false; }
            if (url) window.open(url, '_blank');
        }

        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/quote', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(Object.fromEntries(new FormData(e.target))) });
            if (res.ok) { alert('Message sent!'); e.target.reset(); } else { alert('Failed.'); }
        });

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const isSignUp = document.getElementById('authTitle').textContent === 'Sign Up';
            const res = await fetch(isSignUp ? '/api/auth/signup' : '/api/auth/signin', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: document.getElementById('authEmail').value, password: document.getElementById('authPassword').value })
            });
            const data = await res.json();
            if (res.ok) { if (!isSignUp) { localStorage.setItem('token', data.token); location.reload(); } else { alert('Created!'); toggleAuth(); } }
        });

        function toggleAuth() {
            const title = document.getElementById('authTitle'), btn = document.getElementById('authBtn'), toggle = document.getElementById('toggleBtn');
            if (title.textContent === 'Welcome Back') { title.textContent = 'Sign Up'; btn.textContent = 'Sign Up'; toggle.textContent = 'Sign In'; }
            else { title.textContent = 'Welcome Back'; btn.textContent = 'Sign In'; toggle.textContent = 'Sign Up'; }
        }

        function logout() { localStorage.removeItem('token'); location.reload(); }
        window.addEventListener('load', () => { if (localStorage.getItem('token')) document.getElementById('userDisplay').classList.remove('hidden'); });
    </script>
</body>
</html>
