<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech Solutions | Professional IT Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen selection:bg-blue-600/30 selection:text-blue-400">

    <header class="sticky top-0 z-50 border-b border-slate-900 bg-slate-950/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-lg shadow-lg shadow-blue-600/20">J</div>
                <span class="text-xl font-bold text-white tracking-tight">JoyTech <span class="text-blue-500 font-medium">Solutions</span></span>
            </div>
            
            <div id="userDisplay" class="hidden flex items-center space-x-4">
                <span id="userNameDisplay" class="text-xs font-medium text-slate-400"></span>
                <button onclick="logout()" class="bg-red-500/10 hover:bg-red-500/20 text-red-500 px-4 py-2 rounded-lg text-xs font-semibold uppercase tracking-wider transition">Logout</button>
            </div>
        </div>
    </header>

    <section id="home" class="max-w-4xl mx-auto px-6 pt-20 pb-16 text-center space-y-6">
        <h1 class="text-xl md:text-2xl font-bold text-white tracking-tight leading-tight uppercase max-w-2xl mx-auto">
            Web & Software Development, Graphic Design, Networking, KRA, eCitizen, and Computer Solutions
        </h1>
    </section>

    <section id="services" class="max-w-7xl mx-auto px-6 py-20 border-t border-slate-900">
        <div class="text-center mb-16"><h2 class="text-2xl md:text-3xl font-extrabold text-white mb-3">What We Can Do For You</h2></div>
        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-6 space-y-4">
                <div class="w-12 h-12 bg-slate-950 border border-slate-800 rounded-xl flex items-center justify-center text-xl">🌐</div>
                <h3 class="font-bold text-white">Web & Software Dev</h3>
            </div>
            <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-6 space-y-4">
                <div class="w-12 h-12 bg-slate-950 border border-slate-800 rounded-xl flex items-center justify-center text-xl">🎨</div>
                <h3 class="font-bold text-white">Graphic Design</h3>
            </div>
            <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-6 space-y-4">
                <div class="w-12 h-12 bg-slate-950 border border-slate-800 rounded-xl flex items-center justify-center text-xl">📡</div>
                <h3 class="font-bold text-white">Networking</h3>
            </div>
            <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-6 space-y-4">
                <div class="w-12 h-12 bg-slate-950 border border-slate-800 rounded-xl flex items-center justify-center text-xl">💻</div>
                <h3 class="font-bold text-white">Computer Solutions</h3>
            </div>
        </div>
    </section>

    <section id="request" class="max-w-xl mx-auto px-6 py-20 border-t border-slate-900">
        <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-8 md:p-10 shadow-2xl space-y-6">
            <h2 class="text-2xl font-bold text-white text-center">Send Us a Message</h2>
            <div id="statusBanner" class="hidden text-center p-4 rounded-xl text-xs font-bold border"></div>
            <form id="submissionForm" class="space-y-5">
                <input type="text" id="formName" required placeholder="Your Name" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
                <input type="email" id="formEmail" required placeholder="Your Email" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
                <select id="formService" required class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none cursor-pointer">
                    <option value="" disabled selected>Select a Service</option>
                    <option value="Web & Software Development">Web & Software Development</option>
                    <option value="Graphic Design">Graphic Design</option>
                    <option value="Networking">Networking</option>
                    <option value="KRA Tax Returns">KRA Tax Returns</option>
                    <option value="eCitizen Applications">eCitizen Applications</option>
                    <option value="Computer Solutions">Computer Solutions</option>
                </select>
                <textarea id="formMessage" rows="4" required placeholder="Requirements details..." class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none resize-none"></textarea>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition text-xs uppercase tracking-wider">Send Message</button>
            </form>
        </div>
    </section>

    <div id="authModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 w-full max-w-sm shadow-2xl">
            <h3 id="authTitle" class="text-xl font-bold text-white mb-6">Sign Up</h3>
            <div id="authStatus" class="hidden mb-4 text-center p-3 rounded-lg text-xs font-bold border"></div>
            <form id="authForm" class="space-y-4">
                <input type="text" id="authName" required placeholder="Full Name" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none focus:border-blue-500 transition">
                <input type="email" id="authEmail" required placeholder="Email Address" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none focus:border-blue-500 transition">
                <input type="password" id="authPassword" required placeholder="Password" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none focus:border-blue-500 transition">
                <button type="submit" id="authBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition text-xs uppercase tracking-wider">Create Account</button>
            </form>
            <div class="mt-4 text-center">
                <button onclick="toggleAuth()" id="toggleBtn" class="text-xs text-slate-500 hover:text-blue-500 transition">Already have an account? Sign In</button>
            </div>
        </div>
    </div>

    <script>
        const statusBanner = document.getElementById('statusBanner');
        const authStatus = document.getElementById('authStatus');

        function showBanner(banner, message, isSuccess) {
            banner.textContent = message;
            banner.classList.remove('hidden', 'bg-emerald-950', 'text-emerald-400', 'border-emerald-900', 'bg-red-950', 'text-red-400', 'border-red-900');
            banner.classList.add('block', isSuccess ? 'bg-emerald-950' : 'bg-red-950', isSuccess ? 'text-emerald-400' : 'text-red-400', isSuccess ? 'border-emerald-900' : 'border-red-900');
        }

        function checkLogin() {
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('userDisplay').classList.remove('hidden');
                document.getElementById('authModal').classList.add('hidden');
            } else {
                document.getElementById('authModal').classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        window.addEventListener('load', checkLogin);

        function toggleAuth() {
            const title = document.getElementById('authTitle');
            const btn = document.getElementById('authBtn');
            const toggle = document.getElementById('toggleBtn');
            const nameField = document.getElementById('authName');
            authStatus.classList.add('hidden');
            if (title.textContent === 'Sign Up') {
                title.textContent = 'Sign In'; btn.textContent = 'Sign In';
                toggle.textContent = 'Don\'t have an account? Sign Up';
                nameField.classList.add('hidden'); nameField.required = false;
            } else {
                title.textContent = 'Sign Up'; btn.textContent = 'Create Account';
                toggle.textContent = 'Already have an account? Sign In';
                nameField.classList.remove('hidden'); nameField.required = true;
            }
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authBtn');
            const isSignUp = document.getElementById('authTitle').textContent === 'Sign Up';
            btn.disabled = true; btn.textContent = 'Processing...';
            const payload = { email: document.getElementById('authEmail').value, password: document.getElementById('authPassword').value };
            if(isSignUp) payload.name = document.getElementById('authName').value;
            try {
                const endpoint = isSignUp ? '/api/auth/signup' : '/api/auth/signin';
                const response = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                if (response.ok) {
                    if (isSignUp) { showBanner(authStatus, "Account created! Switching to Sign In...", true); setTimeout(toggleAuth, 1500); }
                    else { localStorage.setItem('token', data.token); location.reload(); }
                } else { showBanner(authStatus, data.error || "Operation failed", false); }
            } catch (err) { showBanner(authStatus, "Server unreachable", false); }
            finally { btn.disabled = false; btn.textContent = isSignUp ? 'Create Account' : 'Sign In'; }
        });

        document.getElementById('submissionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const formData = {
                name: document.getElementById('formName').value,
                email: document.getElementById('formEmail').value,
                service: document.getElementById('formService').value,
                message: document.getElementById('formMessage').value
            };
            btn.disabled = true; btn.textContent = 'Sending...';
            try {
                const response = await fetch('/api/quote', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
                if (response.ok) { showBanner(statusBanner, "Message sent to Neon Database!", true); e.target.reset(); }
                else { showBanner(statusBanner, "Failed to send message.", false); }
            } catch (err) { showBanner(statusBanner, "Network error.", false); }
            finally { btn.disabled = false; btn.textContent = 'Send Message'; }
        });
    </script>
</body>
</html>
