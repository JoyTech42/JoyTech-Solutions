<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | JoyTech Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans flex items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(37,99,235,0.05)_0,transparent_100%)]"></div>

    <div class="relative w-full max-w-md mx-6 bg-slate-900/50 backdrop-blur-md p-10 rounded-2xl border border-slate-800/80 shadow-2xl space-y-8">
        
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-[1px] bg-gradient-to-r from-transparent via-blue-500 to-transparent"></div>
        
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-extrabold text-white tracking-tight">System Access</h1>
            <p class="text-slate-400 text-xs">Verify your admin session credentials to continue.</p>
        </div>

        <div id="authFeedback" class="hidden p-3.5 rounded-xl text-xs text-center font-semibold"></div>

        <form id="authForm" class="space-y-5">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Administrative Email</label>
                <input type="email" id="email" required placeholder="name@joytech.com" autocomplete="username"
                       class="w-full px-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl text-white text-sm outline-none focus:border-blue-500 transition placeholder:text-slate-700">
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Master Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password"
                       class="w-full px-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl text-white text-sm outline-none focus:border-blue-500 transition placeholder:text-slate-700">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition text-xs uppercase tracking-wider shadow-lg shadow-blue-600/10 active:scale-[0.99]">
                Verify Credentials
            </button>
        </form>
    </div>

    <script>
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedback = document.getElementById('authFeedback');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    feedback.className = "p-3.5 rounded-xl text-xs text-center font-semibold bg-emerald-950/50 text-emerald-400 border border-emerald-900/30";
                    feedback.textContent = "Access verified. Syncing console layout...";
                    feedback.classList.remove('hidden');

                    // Store the runtime auth token inside browser cache
                    localStorage.setItem('joytech_admin_token', data.token);
                    
                    setTimeout(() => {
                        window.location.href = '/admin.html';
                    }, 800);
                } else {
                    throw new Error(data.error || "Authentication system rejection.");
                }
            } catch (err) {
                feedback.className = "p-3.5 rounded-xl text-xs text-center font-semibold bg-red-950/50 text-red-400 border border-red-900/30";
                feedback.textContent = err.message;
                feedback.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
