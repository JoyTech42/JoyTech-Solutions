<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech Admin | Sorted Inbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-4 md:p-8 font-sans">
    <div class="max-w-4xl mx-auto space-y-8">
        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-800 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">JoyTech Solutions Inbox</h1>
                <p class="text-slate-400 text-sm mt-1">Review, sort, and manage incoming customer requests instantly.</p>
            </div>
            <a href="/" class="text-xs text-slate-400 hover:text-white transition underline self-start sm:self-center">← Back to Homepage</a>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 max-w-md shadow-xl space-y-3">
            <label class="block text-xs font-bold text-slate-400 tracking-wider uppercase">Admin Authentication</label>
            <div class="flex gap-3">
                <input type="password" id="adminPass" placeholder="Enter Environment Password" class="w-full px-4 py-2.5 rounded-lg bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-blue-500 text-sm transition">
                <button onclick="loadMessages()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-bold text-sm transition shrink-0 shadow-md">View Messages</button>
            </div>
        </div>

        <div id="errorBox" class="hidden bg-red-900/40 border border-red-500/50 text-red-200 p-4 rounded-xl text-sm"></div>

        <div id="filterBar" class="hidden space-y-3 bg-slate-800/50 p-4 rounded-xl border border-slate-800">
            <p class="text-xs font-bold text-slate-400 tracking-wider uppercase">Filter Requests by Category:</p>
            <div class="flex flex-wrap gap-2">
                <button onclick="filterMessages('All')" class="filter-btn bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold transition shadow-sm">All Messages</button>
                <button onclick="filterMessages('KRA Assistance')" class="filter-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg text-xs font-bold transition border border-slate-700">KRA Tax</button>
                <button onclick="filterMessages('eCitizen Services')" class="filter-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg text-xs font-bold transition border border-slate-700">eCitizen Portal</button>
                <button onclick="filterMessages('CV Writing')" class="filter-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg text-xs font-bold transition border border-slate-700">CV Writing</button>
                <button onclick="filterMessages('Computer Repair & Web Dev')" class="filter-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg text-xs font-bold transition border border-slate-700">Repairs & Web</button>
                <button onclick="filterMessages('Other Support')" class="filter-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg text-xs font-bold transition border border-slate-700">Other</button>
            </div>
        </div>

        <div id="messagesList" class="space-y-4">
            <p class="text-slate-500 italic p-4 bg-slate-800/30 rounded-xl border border-slate-800 border-dashed text-sm">No data streamed. Enter your admin password above to authenticate.</p>
        </div>
    </div>

    <script>
        let allMessages = []; // Local storage array for filter processing

        async function loadMessages() {
            const password = document.getElementById('adminPass').value;
            const errorBox = document.getElementById('errorBox');
            const container = document.getElementById('messagesList');
            const filterBar = document.getElementById('filterBar');
            
            errorBox.classList.add('hidden');
            
            try {
                const response = await fetch('/api/messages', {
                    method: 'GET',
                    headers: { 'X-Admin-Password': password }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Access denied. Incorrect administrator token.');
                }

                allMessages = data; 
                filterBar.classList.remove('hidden'); 
                displayMessages(allMessages); 

            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.classList.remove('hidden');
                filterBar.classList.add('hidden');
                container.innerHTML = '<p class="text-red-400 italic text-sm p-4 bg-red-950/20 border border-red-900 rounded-xl">Authentication sequence failed. Check your password and try again.</p>';
            }
        }

        function filterMessages(category) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                if (btn.textContent.includes(category) || (category === 'All' && btn.textContent === 'All Messages')) {
                    btn.className = "filter-btn bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold transition shadow-sm";
                } else {
                    btn.className = "filter-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg text-xs font-bold transition border border-slate-700";
                }
            });

            if (category === 'All') {
                displayMessages(allMessages);
            } else {
                const filtered = allMessages.filter(msg => msg.service === category);
                displayMessages(filtered);
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesList');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="text-slate-400 italic p-6 bg-slate-800 rounded-xl border border-slate-700 text-sm">No live customer records matched this category filter.</div>';
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 space-y-3 shadow-lg transition duration-200 hover:border-slate-600">
                    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start border-b border-slate-700/60 pb-3 gap-2">
                        <div>
                            <h3 class="text-base font-bold text-white tracking-wide">${msg.name}</h3>
                            <p class="text-blue-400 text-xs mt-0.5">${msg.email}</p>
                        </div>
                        <div class="text-left sm:text-right space-y-1.5 shrink-0">
                            <span class="inline-block bg-blue-950/60 text-blue-300 border border-blue-800/80 px-2.5 py-0.5 rounded-full text-[11px] font-bold uppercase tracking-wider">
                                ${msg.service || 'General Inquiry'}
                            </span>
                            <p class="text-[10px] text-slate-500 font-mono">${new Date(msg.submitted_at).toLocaleString()}</p>
                        </div>
                    </div>
                    <p class="text-slate-300 text-sm whitespace-pre-wrap pt-1 leading-relaxed">${msg.message}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
