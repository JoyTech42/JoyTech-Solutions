<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | JoyTech Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans flex items-center justify-center relative overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(37,99,235,0.04)_0,transparent_100%)]"></div>

    <div class="relative w-full max-w-md mx-6 bg-slate-900/50 backdrop-blur-md p-10 rounded-2xl border border-slate-800/80 shadow-2xl space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-extrabold text-white tracking-tight">System Login</h1>
            <p class="text-slate-400 text-xs">Verify your operational session token credentials.</p>
        </div>

        <div id="feedback" class="hidden p-3.5 rounded-xl text-xs text-center font-semibold"></div>

        <form id="signinForm" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Email Address</label>
                <input type="email" id="email" required placeholder="admin@joytech.com" class="w-full px-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl text-white text-sm outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-950/80 border border-slate-800 rounded-xl text-white text-sm outline-none focus:border-blue-500 transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition text-xs uppercase tracking-wider shadow-lg shadow-blue-600/10">
                Verify Credentials
            </button>
        </form>

        <p class="text-center text-xs text-slate-500">
            Need an account? <a href="/signup.html" class="text-blue-500 hover:underline font-medium ml-1">Create account first</a>
        </p>
    </div>

    <script>
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('feedback');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    alertBox.className = "p-3.5 rounded-xl text-xs text-center font-semibold bg-emerald-950/50 text-emerald-400 border border-emerald-900/30";
                    alertBox.textContent = "Access Granted! Synchronizing workspace matrix...";
                    alertBox.classList.remove('hidden');

                    localStorage.setItem('joytech_token', data.token);
                    setTimeout(() => window.location.href = '/admin.html', 1000);
                } else {
                    throw new Error(data.error || "Authentication system rejection.");
                }
            } catch (err) {
                alertBox.className = "p-3.5 rounded-xl text-xs text-center font-semibold bg-red-950/50 text-red-400 border border-red-900/30";
                alertBox.textContent = err.message;
                alertBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
