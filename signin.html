<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | JoyTech Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-6">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 w-full max-w-sm shadow-2xl">
        <h3 class="text-xl font-bold text-white mb-6">Sign In</h3>
        <form id="signinForm" class="space-y-4">
            <input type="email" id="email" required placeholder="Email Address" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
            <input type="password" id="password" required placeholder="Password" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition text-xs uppercase tracking-wider">
                Sign In
            </button>
        </form>
        <div class="mt-4 text-center space-y-2">
            <p class="text-xs text-slate-500">
                Don't have an account? <a href="signup.html" class="text-blue-500 hover:underline">Sign Up</a>
            </p>
            <button onclick="alert('Contact support@joytech.com')" class="text-[10px] text-slate-600 hover:text-blue-400 underline">Forgot Password?</button>
        </div>
    </div>

    <script>
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = 'Signing in...';

            try {
                const response = await fetch('/api/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    alert("Sign in successful!");
                    window.location.href = 'index.html'; // Or your dashboard
                } else {
                    alert("Error: " + (data.error || "Authentication failed"));
                }
            } catch (err) {
                alert("Server error. Check your API.");
            } finally {
                btn.disabled = false; btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
