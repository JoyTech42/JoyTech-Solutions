<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | JoyTech Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-6">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 w-full max-w-sm shadow-2xl">
        <h3 class="text-xl font-bold text-white mb-6">Create Account</h3>
        <form id="signupForm" class="space-y-4">
            <input type="text" id="name" required placeholder="Full Name" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
            <input type="email" id="email" required placeholder="Email Address" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
            <input type="password" id="password" required placeholder="Password" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs outline-none">
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition text-xs uppercase tracking-wider">
                Create Account
            </button>
        </form>
        <p class="mt-4 text-center text-xs text-slate-500">
            Already have an account? <a href="signin.html" class="text-blue-500 hover:underline">Sign In</a>
        </p>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = 'Processing...';

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    alert("Account created successfully!");
                    window.location.href = 'signin.html';
                } else {
                    alert("Error: " + (data.error || "Signup failed"));
                }
            } catch (err) {
                alert("Server error. Check your API.");
            } finally {
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
